<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Exam Portal - Welcome</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/portal.css}">
    <style>
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            background: linear-gradient(135deg, #0066FF 0%, #0052CC 100%);
            color: white;
            padding: 20px;
        }
        .hero h1 {
            color: white;
            font-size: 3rem;
            margin-bottom: 20px;
        }
        .hero p {
            font-size: 1.25rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 40px;
            max-width: 600px;
        }
        .hero-buttons {
            display: flex;
            gap: 20px;
        }
        .btn-light {
            background-color: white;
            color: var(--primary-color);
        }
        .btn-light:hover {
            background-color: #f8f9fa;
            color: var(--primary-hover);
        }
        .btn-outline-light {
            border-color: rgba(255,255,255,0.5);
            color: white;
        }
        .btn-outline-light:hover {
            background-color: rgba(255,255,255,0.1);
            border-color: white;
            color: white;
        }
    </style>
</head>
<body>
    <div class="hero">
        <div style="margin-bottom: 3rem; animation: fadeInDown 1s ease-out;">
            <div style="display: inline-block; padding: 15px 40px; background: rgba(0, 0, 0, 0.25); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 60px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);">
                <h2 style="font-size: 3.5rem; font-weight: 800; color: white; margin: 0; letter-spacing: -1px; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; gap: 20px;">
                    <span style="text-shadow: 0 2px 10px rgba(0,0,0,0.2);">Anand</span>
                    <span style="display: inline-block; width: 4px; height: 40px; background-color: var(--accent-color); border-radius: 2px; box-shadow: 0 0 15px var(--accent-color);"></span>
                    <span style="font-weight: 300; color: #e6f0ff; text-shadow: 0 2px 10px rgba(0,0,0,0.2);">CKS</span>
                </h2>
            </div>
        </div>
        
        <i class="fa-solid fa-graduation-cap" style="font-size: 3rem; margin-bottom: 20px; color: rgba(255,255,255,0.8);"></i>
        <h1 style="font-size: 2.5rem;">Online Exam Portal</h1>
        <p>A modern, secure, and easy-to-use platform for taking and administering professional exams seamlessly.</p>
        
        <div class="hero-buttons">
            <a href="/login" class="btn btn-light" style="padding: 12px 24px; font-size: 1rem; border-radius: 8px;"><i class="fa-solid fa-user"></i> Student Login</a>
            <a href="/admin" class="btn btn-outline-light" style="padding: 12px 24px; font-size: 1rem; border-radius: 8px; border: 1px solid white;"><i class="fa-solid fa-user-shield"></i> Admin Panel</a>
        </div>
    </div>
</body>
</html>
