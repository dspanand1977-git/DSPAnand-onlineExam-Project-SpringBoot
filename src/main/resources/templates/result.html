<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Exam Result')}"></head>
<body>
<div class="app-container">
    <aside th:replace="~{fragments/sidebar :: userSidebar('exams')}"></aside>
    <main class="main-content">
        <header th:replace="~{fragments/topbar :: topbar('Exam Result', 'Student')}"></header>
        
        <div class="content-area" style="display: flex; align-items: center; justify-content: center;">
            <div class="card text-center" style="max-width: 500px; width: 100%; padding: 48px; border-top: 6px solid var(--primary-color);">
                <div style="width: 80px; height: 80px; background-color: rgba(0, 102, 255, 0.1); color: var(--primary-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 24px auto;">
                    <i class="fa-solid fa-trophy"></i>
                </div>
                
                <h2 style="font-size: 1.75rem; margin-bottom: 8px;">Exam Completed!</h2>
                <p class="text-secondary" style="margin-bottom: 32px;">You have successfully submitted the exam.</p>
                
                <div style="background-color: var(--bg-main); border-radius: var(--radius-lg); padding: 32px; margin-bottom: 32px;">
                    <p style="font-size: 1rem; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;">Your Final Score</p>
                    <h1 th:text="${score}" style="font-size: 4rem; color: var(--primary-color); margin: 0; line-height: 1;"></h1>
                </div>
                
                <a th:href="@{/dashboard}" class="btn btn-outline" style="width: 100%; padding: 12px; font-size: 1rem;">
                    <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </main>
</div>
</body>
</html>
